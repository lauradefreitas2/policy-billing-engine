services:
  postgres:
    image: postgres:16-alpine
    container_name: policy-billing-postgres
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - policy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  policy_postgres_data:
